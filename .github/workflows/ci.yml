name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

# contents: read for checkout, id-token: write for fly oidc authentication
permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -r typecheck

      - name: test
        run: pnpm -r test

      - name: build sdk
        run: pnpm --filter @hummusonrails/flagpole-client build

      # authenticates via oidc and wires docker and npm to the fly registry
      # must run before any push or publish step
      - uses: jfrog/fly-action@v1

      # the service is built inside the image, context is the repo root
      - name: build service image
        run: >-
          docker build -f service/Dockerfile
          -t ${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/flagpole-service:${{ github.sha }}
          -t ${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/flagpole-service:latest
          .

      - name: push service image
        run: |
          docker push ${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/flagpole-service:${{ github.sha }}
          docker push ${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/flagpole-service:latest

      # fly rejects republishing an existing version, so skip with a clear log
      # any other publish failure still fails the job
      - name: publish sdk
        working-directory: packages/flagpole-client
        run: |
          name="$(jq -r .name package.json)"
          version="$(jq -r .version package.json)"
          existing="$(npm view "$name@$version" version 2>/dev/null || true)"
          if [ -n "$existing" ]; then
            echo "$name@$version already exists in the fly registry, skipping publish"
            echo "bump the version in packages/flagpole-client/package.json to publish a new release"
          else
            echo "publishing $name@$version"
            pnpm publish --no-git-checks
          fi
